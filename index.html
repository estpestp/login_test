<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVATE SPACE SNS</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #0f172a; /* 시크한 다크 블루 배경 유지 */
            color: #f8fafc;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1.logo {
            font-size: 26px;
            color: #38bdf8; 
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            margin: 0;
        }
        .sub-text {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 5px;
        }
        .box {
            background: #1e293b; 
            border: 1px solid #334155;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 8px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #94a3b8;
        }
        input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            border-radius: 8px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        button:hover {
            background-color: #7dd3fc;
        }
        .note {
            font-size: 12px;
            color: #f43f5e;
            margin-top: 6px;
        }

        #authSection { display: block; }
        
        #snsSection {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .welcome-msg {
            background: #334155;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #f43f5e;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            width: auto;
        }
        .logout-btn:hover { background: #e11d48; }
        
        .post-box textarea {
            resize: none;
            height: 80px;
            margin-bottom: 10px;
        }
        
        .feed-list {
            margin-top: 20px;
        }
        .post {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            animation: slideDown 0.3s ease-out;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .post-author {
            font-weight: bold;
            color: #38bdf8;
            font-size: 14px;
        }
        /* 💡 글 삭제 버튼 추가 */
        .delete-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            width: auto;
        }
        .delete-btn:hover {
            color: #f43f5e;
        }
        .post-content {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-all;
        }
        .post-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
            text-align: right;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">PRIVATE SPACE</h1>
        <div class="sub-text">인증된 멤버들만 소통하는 시크릿 피드</div>
    </div>

    <div id="authSection">
        <div class="box">
            <h3>1. 회원가입 신청 (Formspree)</h3>
            <div data-fs-success style="color: #38bdf8; text-align:center; display:none; margin-bottom:15px; font-weight:bold;">
                🎉 신청 완료! 관리자 확인 후 승인됩니다.
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>사용할 이메일</label>
                    <input type="email" name="email" data-fs-field placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 설정</label>
                    <input type="password" name="user_code" data-fs-field placeholder="비밀번호 입력" required>
                    <p class="note">⚠️ 스팸 우회 중! 실제 비밀번호 사용 금지</p>
                </div>
                <button type="submit" data-fs-submit-btn>가입 신청 제출하기</button>
            </form>
        </div>

        <div class="box">
            <h3>2. 로그인</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>이메일 아이디</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit">공간 입장하기</button>
            </form>
        </div>
    </div>

    <div id="snsSection">
        <div class="welcome-msg">
            <span>🟢 <strong id="currentUser">user</strong>님 피드</span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="box post-box">
            <h3>📝 새로운 이야기 남기기</h3>
            <form id="postForm">
                <textarea id="postInput" placeholder="여기에 글을 작성해 보세요..." required></textarea>
                <button type="submit">피드에 올리기</button>
            </form>
        </div>

        <div id="feedContainer" class="feed-list"></div>
    </div>
</div>

<script>
    const USERS_DB = [
        { email: "3upoibe2@gmail.com", password: "1234567890" },
        { email: "admin@example.com", password: "adminpassword" }
    ];

    let loggedInUser = "";
    let posts = [];

    // Formspree 초기화
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { 
        formElement: '#signupForm', 
        formId: 'mwvjzjqp',
        onSuccess: function() {
            document.querySelector('[data-fs-success]').style.display = 'block';
            document.getElementById('signupForm').reset();
        }
    });

    // 로그인 기능
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;

        const user = USERS_DB.find(u => u.email === email && u.password === pass);

        if (user) {
            loggedInUser = user.email;
            document.getElementById('currentUser').innerText = loggedInUser;
            
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('snsSection').style.display = 'block';
            
            // 💡 로그인 성공 시 저장소에서 글 불러오기
            loadPosts();
        } else {
            alert("❌ 멤버 정보가 올바르지 않습니다.");
        }
    });

    // 로그아웃 기능
    function logout() {
        loggedInUser = "";
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('snsSection').style.display = 'none';
        document.getElementById('loginForm').reset();
    }

    // 💡 저장소에서 글 가져와서 화면에 뿌리기
    function loadPosts() {
        const savedPosts = localStorage.getItem('sns_posts');
        if (savedPosts) {
            posts = JSON.parse(savedPosts);
        } else {
            // 저장된 글이 없을 때만 보여줄 기본 웰컴 글
            posts = [{ id: Date.now(), author: "admin@example.com", content: "우리들만의 비밀 SNS 공간이 개설되었습니다! 자유롭게 피드를 채워보세요. 🥳", time: "2026.06.17 12:00" }];
        }
        renderFeed();
    }

    // 피드 출력 함수
    function renderFeed() {
        const container = document.getElementById('feedContainer');
        container.innerHTML = "";

        // 최신 글이 위로 오게 역순 정렬
        [...posts].reverse().forEach(post => {
            const postEl = document.createElement('div');
            postEl.className = 'post';
            
            // 내가 쓴 글일 때만 삭제 버튼이 보이도록 분기 처리
            const isMyPost = post.author === loggedInUser;
            const deleteBtnHtml = isMyPost ? `<button class="delete-btn" onclick="deletePost(${post.id})">삭제</button>` : '';

            postEl.innerHTML = `
                <div class="post-header">
                    <div class="post-author">👤 ${post.author}</div>
                    ${deleteBtnHtml}
                </div>
                <div class="post-content">${post.content.replace(/\n/g, '<br>')}</div>
                <div class="post-time">${post.time}</div>
            `;
            container.appendChild(postEl);
        });
    }

    // 게시글 등록 기능
    document.getElementById('postForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const content = document.getElementById('postInput').value.trim();
        if (!content) return;

        const now = new Date();
        const timeStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        // 새 글 오브젝트 생성 (고유 id 부여)
        const newPost = {
            id: Date.now(),
            author: loggedInUser,
            content: content,
            time: timeStr
        };

        posts.push(newPost);
        
        // 💡 로컬 스토리지에 저장 (새로고침 버그 차단!)
        localStorage.setItem('sns_posts', JSON.stringify(posts));

        document.getElementById('postInput').value = "";
        renderFeed();
    });

    // 💡 글 삭제 기능 추가
    function deletePost(postId) {
        if (!confirm("정말 이 글을 삭제하시겠습니까?")) return;
        
        // 해당 id의 글만 제외하고 남기기
        posts = posts.filter(post => post.id !== postId);
        
        // 변경된 배열을 다시 로컬 스토리지에 덮어쓰기
        localStorage.setItem('sns_posts', JSON.stringify(posts));
        renderFeed();
    }
</script>

<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
