<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AND2BLE PRIVATE SNS</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #0f172a; /* 시크하고 깊은 다크 블루 배경 */
            color: #f8fafc;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1.logo {
            font-size: 26px;
            color: #38bdf8; /* 화사한 스카이 블루 포인트 */
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            margin: 0;
        }
        .sub-text {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 5px;
        }
        .box {
            background: #1e293b; /* 메인 콘텐츠 박스 */
            border: 1px solid #334155;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 8px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #94a3b8;
        }
        input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            border-radius: 8px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        button:hover {
            background-color: #7dd3fc;
        }
        .note {
            font-size: 12px;
            color: #f43f5e;
            margin-top: 6px;
        }

        /* 💡 2번 인증 세션 숨김 대기 */
        #authSection { display: block; }

        /* 💡 3번 SNS 피드 영역 (처음엔 숨김) */
        #snsSection {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .welcome-msg {
            background: #334155;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #f43f5e;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            width: auto;
        }
        .logout-btn:hover { background: #e11d48; }
        
        /* 피드 글쓰기 창 */
        .post-box textarea {
            resize: none;
            height: 80px;
            margin-bottom: 10px;
        }
        
        /* 타임라인 게시글 스타일 */
        .feed-list {
            margin-top: 20px;
        }
        .post {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            animation: slideDown 0.3s ease-out;
        }
        .post-author {
            font-weight: bold;
            color: #38bdf8;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .post-content {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-all;
        }
        .post-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
            text-align: right;
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">AND2BLE PRIVATE SPACE</h1>
        <div class="sub-text">우리 멤버들만 글을 쓰고 소통하는 비밀 피드</div>
    </div>

    <div id="authSection">
        <div class="box">
            <h3>1. 회원가입 신청 (Formspree)</h3>
            <div data-fs-success style="color: #38bdf8; text-align:center; display:none; margin-bottom:15px; font-weight:bold;">
                🎉 신청 완료! 관리자 메일 확인 후 회원등록을 진행합니다.
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>사용할 이메일</label>
                    <input type="email" name="email" data-fs-field placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 설정</label>
                    <input type="password" name="user_code" data-fs-field placeholder="비밀번호 입력" required>
                    <p class="note">⚠️ 스팸 우회 중! 진짜 비밀번호 사용 금지</p>
                </div>
                <button type="submit" data-fs-submit-btn>가입 신청 제출하기</button>
            </form>
        </div>

        <div class="box">
            <h3>2. 멤버 로그인</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>이메일 아이디</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit">공간 입장하기</button>
            </form>
        </div>
    </div>

    <div id="snsSection">
        <div class="welcome-msg">
            <span>🟢 <strong id="currentUser">user</strong>님 전용 멤버 피드 인증됨</span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="box post-box">
            <h3>📝 새로운 소식 남기기</h3>
            <form id="postForm">
                <textarea id="postInput" placeholder="오늘 앤더블 음방 교차편집 보셨나요? 멤버들에게 이야기를 전해보세요!" required></textarea>
                <button type="submit">피드에 올리기</button>
            </form>
        </div>

        <div id="feedContainer" class="feed-list">
            </div>
    </div>

</div>

<script>
    // 💡 [회원 목록 및 로그인 정보 관리 데이터베이스]
    const USERS_DB = [
        { email: "3upoibe2@gmail.com", password: "1234567890" },
        { email: "admin@example.com", password: "adminpassword" }
    ];

    // 현재 로그인된 유저 임시 저장
    let loggedInUser = "";

    // 임시 초기 타임라인 더미 데이터
    let posts = [
        { author: "admin@example.com", content: "앤더블 프라이빗 SNS 공간이 개설되었습니다! 가입하신 멤버분들은 자유롭게 피드를 채워주세요. 🥳", time: "2026.06.17 12:00" }
    ];

    // Formspree 가입 연동 (mwvjzjqp)
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { 
        formElement: '#signupForm', 
        formId: 'mwvjzjqp',
        onSuccess: function() {
            document.querySelector('[data-fs-success]').style.display = 'block';
            document.getElementById('signupForm').reset();
        }
    });

    // 로그인 기능
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;

        const user = USERS_DB.find(u => u.email === email && u.password === pass);

        if (user) {
            loggedInUser = user.email;
            document.getElementById('currentUser').innerText = loggedInUser;
            
            // 화면 전환
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('snsSection').style.display = 'block';
            
            // 피드 그리기
            renderFeed();
        } else {
            alert("❌ 멤버 정보가 올바르지 않거나 아직 미승인 상태입니다.");
        }
    });

    // 로그아웃 기능
    function logout() {
        loggedInUser = "";
        document.getElementById('authSection').style.display = 'block';
        document.getElementById('snsSection').style.display = 'none';
        document.getElementById('loginForm').reset();
    }

    // 피드 목록을 화면에 그리는 함수
    function renderFeed() {
        const container = document.getElementById('feedContainer');
        container.innerHTML = ""; // 기존 피드 리셋

        // 최신글이 위로 오도록 배열을 뒤집어서 뿌려줍니다.
        [...posts].reverse().forEach(post => {
            const postEl = document.createElement('div');
            postEl.className = 'post';
            postEl.innerHTML = `
                <div class="post-author">👤 ${post.author}</div>
                <div class="post-content">${post.content.replace(/\n/g, '<br>')}</div>
                <div class="post-time">${post.time}</div>
            `;
            container.appendChild(postEl);
        });
    }

    // 게시글 등록 기능
    document.getElementById('postForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const content = document.getElementById('postInput').value.trim();
        if (!content) return;

        // 현재 시간 구하기
        const now = new Date();
        const timeStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        // 새 게시글 데이터 배열에 저장
        posts.push({
            author: loggedInUser,
            content: content,
            time: timeStr
        });

        // 폼 초기화 및 피드 새로고침
        document.getElementById('postInput').value = "";
        renderFeed();
    });
</script>

<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
