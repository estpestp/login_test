<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AND2BLE (앤더블) 팬즈 로그인</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 30px;
            background-color: #111111; /* 앤더블 컨셉에 맞춘 시크한 블랙 배경 */
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .box {
            background: #222222;
            border: 1px solid #333333;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h2.title {
            text-align: center;
            color: #00e5ff; /* 사이버틱한 포인트 컬러 */
            text-shadow: 0 0 10px rgba(0,229,255,0.5);
            margin-bottom: 30px;
        }
        h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 8px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #aaa;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #444;
            background-color: #333;
            color: #fff;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00e5ff;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        button:hover {
            background-color: #00b2cc;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .note {
            font-size: 12px;
            color: #ff5252;
            margin-top: 5px;
        }

        /* 💡 갤러리 영역 스타일 */
        #gallerySection {
            display: none; /* ⭐ 처음에는 숨겨둠 */
            animation: fadeIn 0.5s ease-in-out;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photo-card {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            border-color: #00e5ff;
        }
        .photo-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            background-color: #444; /* 사진 로딩 전 보여줄 임시 배경 */
        }
        .photo-card p {
            margin: 10px 0;
            font-weight: bold;
            color: #fff;
        }

        /* 애니메이션 효과 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="title">AND2BLE OFFICIAL FAN PAGE</h2>

    <div id="authSection">
        <div class="box">
            <h3>1. 회원가입 신청</h3>
            <div data-fs-success style="color: #00e5ff; margin-bottom:15px; text-align:center; display:none;">
                🎉 신청 완료! 대시보드 확인 후 배열에 추가해 주세요.
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>신청할 이메일 아이디</label>
                    <input type="email" name="email" data-fs-field placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 설정</label>
                    <input type="password" name="user_code" data-fs-field placeholder="비밀번호를 입력하세요" required>
                    <p class="note">⚠️ 차단 우회 중! 실제 비밀번호 금지</p>
                </div>
                <button type="submit" data-fs-submit-btn>가입 신청서 제출</button>
            </form>
        </div>

        <div class="box">
            <h3>2. 로그인</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>이메일 아이디</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">로그인</button>
            </form>
        </div>
    </div>

    <div id="gallerySection">
        <div class="box">
            <h3>📸 AND2BLE 데뷔 컨셉 포토 갤러리</h3>
            <p style="color: #aaa; text-align:center;">미니 1집 《SEQUENCE 01 : CURIOSITY》 26SS COLLECTION</p>
            
            <div class="gallery-grid">
                <div class="photo-card">
                    <img src="https://via.placeholder.com/300x400/333/fff?text=ZHANG+HAO" alt="장하오">
                    <p>장하오 (ZHANG HAO)</p>
                </div>
                <div class="photo-card">
                    <img src="https://via.placeholder.com/300x400/333/fff?text=YOO+SEUNG+EON" alt="유승언">
                    <p>유승언 (YOO SEUNG EON)</p>
                </div>
                <div class="photo-card">
                    <img src="https://via.placeholder.com/300x400/333/fff?text=RICKY" alt="리키">
                    <p>리키 (RICKY)</p>
                </div>
                <div class="photo-card">
                    <img src="https://via.placeholder.com/300x400/333/fff?text=KIM+GYU+VIN" alt="김규빈">
                    <p>김규빈 (KIM GYU VIN)</p>
                </div>
                <div class="photo-card">
                    <img src="https://via.placeholder.com/300x400/333/fff?text=HAN+YU+JIN" alt="한유진">
                    <p>한유진 (HAN YU JIN)</p>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // 💡 아까 대시보드에서 성공하셨던 유저 데이터를 여기에 넣어줍니다!
    const USERS_DB = [
        { email: "3upoibe2@gmail.com", password: "1234567890" },
        { email: "admin@example.com", password: "adminpassword" }
    ];

    // Formspree 초기화
    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { 
        formElement: '#signupForm', 
        formId: 'mwvjzjqp',
        onSuccess: function() {
            document.querySelector('[data-fs-success]').style.display = 'block';
            document.getElementById('signupForm').reset();
        }
    });

    // 로그인 이벤트
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const inputEmail = document.getElementById('loginEmail').value;
        const inputPassword = document.getElementById('loginPassword').value;

        const user = USERS_DB.find(u => u.email === inputEmail && u.password === inputPassword);

        if (user) {
            alert(`🎉 앤더블 오피셜 팬페이지에 오신 것을 환영합니다!`);
            
            // ⭐ 핵심: 로그인 창을 숨기고, 갤러리 창을 보여줍니다!
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('gallerySection').style.display = 'block';
        } else {
            alert("❌ 아직 승인되지 않았거나 비밀번호가 틀렸습니다.");
        }
    });
</script>

<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
