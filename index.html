<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVATE SPACE SNS</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1.logo {
            font-size: 26px;
            color: #38bdf8; 
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
            margin: 0;
        }
        .sub-text {
            color: #94a3b8;
            font-size: 13px;
            margin-top: 5px;
        }
        .box {
            background: #1e293b; 
            border: 1px solid #334155;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 8px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #94a3b8;
        }
        input[type="text"], input[type="email"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: #fff;
            border-radius: 8px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        button:hover {
            background-color: #7dd3fc;
        }
        .note {
            font-size: 12px;
            color: #f43f5e;
            margin-top: 6px;
        }

        #authSection { display: block; }
        
        #snsSection {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .welcome-msg {
            background: #334155;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logout-btn {
            background: #f43f5e;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            width: auto;
        }
        .logout-btn:hover { background: #e11d48; }
        
        .post-box textarea {
            resize: none;
            height: 80px;
            margin-bottom: 10px;
        }
        
        .feed-list {
            margin-top: 20px;
        }
        .post {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            animation: slideDown 0.3s ease-out;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .post-author {
            font-weight: bold;
            color: #38bdf8;
            font-size: 14px;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            width: auto;
        }
        .delete-btn:hover {
            color: #f43f5e;
        }
        .post-content {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-all;
        }
        .post-time {
            font-size: 11px;
            color: #64748b;
            margin-top: 8px;
            text-align: right;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="logo">PRIVATE SPACE</h1>
        <div class="sub-text">인증된 멤버들만 소통하는 시크릿 피드</div>
    </div>

    <div id="authSection">
        <div class="box">
            <h3>1. 회원가입 신청 (Formspree)</h3>
            <div data-fs-success style="color: #38bdf8; text-align:center; display:none; margin-bottom:15px; font-weight:bold;">
                🎉 신청 완료! 관리자 확인 후 승인됩니다.
            </div>
            <form id="signupForm">
                <div class="form-group">
                    <label>활동할 닉네임</label>
                    <input type="text" name="nickname" data-fs-field placeholder="길동이" required>
                </div>
                <div class="form-group">
                    <label>사용할 이메일</label>
                    <input type="email" name="email" data-fs-field placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호 설정</label>
                    <input type="password" name="user_code" data-fs-field placeholder="비밀번호 입력" required>
                    <p class="note">⚠️ 개발자에게 비밀번호와 이메일이 갑니다. 진짜 이메일을 사용하세요.</p>
                </div>
                <button type="submit" data-fs-submit-btn>가입 신청 제출하기</button>
            </form>
        </div>

        <div class="box">
            <h3>2. 로그인</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>이메일 아이디</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit">공간 입장하기</button>
            </form>
        </div>
    </div>

    <div id="snsSection">
        <div class="welcome-msg">
            <span>🟢 <strong id="currentUser">user</strong>님 피드</span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="box post-box">
            <h3>📝 새로운 이야기 남기기</h3>
            <form id="postForm">
                <textarea id="postInput" placeholder="여기에 글을 작성해 보세요..." required></textarea>
                <button type="submit">피드에 올리기</button>
            </form>
        </div>

        <div id="feedContainer" class="feed-list"></div>
    </div>
</div>

<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
<script src="script.js" defer></script>
</body>
</html>
